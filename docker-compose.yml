name: spark-cluster

services:
  spark-driver:
    image: apache/spark:4.0.2-scala2.13-java21-python3-r-ubuntu
    user: "0:0"
    container_name: spark-driver
    hostname: spark-driver
    restart: unless-stopped
    command:
      - /opt/spark/bin/spark-class
      - org.apache.spark.deploy.master.Master
      - --host
      - spark-driver
      - --port
      - "7077"
      - --webui-port
      - "8080"
    environment:
      SPARK_NO_DAEMONIZE: "true"
      PATH: /opt/spark/bin:/opt/java/openjdk/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
    ports:
      - "7077:7077"
      - "8080:8080"
      - "4040:4040"
    cpus: 2.0
    mem_limit: 4g
    volumes:
      - spark_driver_logs:/opt/spark/logs
      - spark_events:/opt/spark/spark-events
      - ./spark/conf/spark-defaults.conf:/opt/spark/conf/spark-defaults.conf:ro
      - ./shared/code:/opt/spark/shared/code
      - ./shared/data:/opt/spark/shared/data
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - spark-net

  spark-worker-1:
    image: apache/spark:4.0.2-scala2.13-java21-python3-r-ubuntu
    user: "0:0"
    container_name: spark-worker-1
    hostname: spark-worker-1
    restart: unless-stopped
    depends_on:
      - spark-driver
    command:
      - /opt/spark/bin/spark-class
      - org.apache.spark.deploy.worker.Worker
      - --webui-port
      - "8081"
      - --cores
      - "2"
      - --memory
      - 4g
      - spark://spark-driver:7077
    environment:
      SPARK_NO_DAEMONIZE: "true"
      PATH: /opt/spark/bin:/opt/java/openjdk/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
    ports:
      - "8081:8081"
    cpus: 2.0
    mem_limit: 4g
    volumes:
      - spark_worker_1_logs:/opt/spark/logs
      - spark_events:/opt/spark/spark-events
      - ./spark/conf/spark-defaults.conf:/opt/spark/conf/spark-defaults.conf:ro
      - ./shared/code:/opt/spark/shared/code
      - ./shared/data:/opt/spark/shared/data
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - spark-net

  spark-worker-2:
    image: apache/spark:4.0.2-scala2.13-java21-python3-r-ubuntu
    user: "0:0"
    container_name: spark-worker-2
    hostname: spark-worker-2
    restart: unless-stopped
    depends_on:
      - spark-driver
    command:
      - /opt/spark/bin/spark-class
      - org.apache.spark.deploy.worker.Worker
      - --webui-port
      - "8081"
      - --cores
      - "2"
      - --memory
      - 4g
      - spark://spark-driver:7077
    environment:
      SPARK_NO_DAEMONIZE: "true"
      PATH: /opt/spark/bin:/opt/java/openjdk/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
    ports:
      - "8082:8081"
    cpus: 2.0
    mem_limit: 4g
    volumes:
      - spark_worker_2_logs:/opt/spark/logs
      - spark_events:/opt/spark/spark-events
      - ./spark/conf/spark-defaults.conf:/opt/spark/conf/spark-defaults.conf:ro
      - ./shared/code:/opt/spark/shared/code
      - ./shared/data:/opt/spark/shared/data
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - spark-net

  spark-history:
    image: apache/spark:4.0.2-scala2.13-java21-python3-r-ubuntu
    user: "0:0"
    container_name: spark-history
    hostname: spark-history
    restart: unless-stopped
    depends_on:
      - spark-driver
    command:
      - /opt/spark/bin/spark-class
      - org.apache.spark.deploy.history.HistoryServer
    environment:
      SPARK_NO_DAEMONIZE: "true"
      PATH: /opt/spark/bin:/opt/java/openjdk/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
      SPARK_HISTORY_OPTS: "-Dspark.history.ui.port=18080 -Dspark.history.fs.logDirectory=file:///opt/spark/spark-events"
    ports:
      - "18080:18080"
    cpus: 2.0
    mem_limit: 4g
    volumes:
      - spark_events:/opt/spark/spark-events
      - ./spark/conf/spark-defaults.conf:/opt/spark/conf/spark-defaults.conf:ro
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - spark-net

volumes:
  spark_driver_logs:
  spark_worker_1_logs:
  spark_worker_2_logs:
  spark_events:


networks:
  spark-net:
    driver: bridge
